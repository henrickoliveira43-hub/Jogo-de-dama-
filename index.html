<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Damas - IA Global</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --border-muted: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #2f81f7;
            --accent-red: #f85149;
            --accent-blue-hover: #1f6feb;
            --board-light: #2d333b;
            --board-dark: #1e232b;
            --piece-red: #f85149;
            --piece-red-dark: #da3633;
            --piece-black: #2f81f7; 
            --piece-black-dark: #1f6feb;
            --valid-move: rgba(47, 129, 247, 0.5);
            --selection-ring: rgba(230, 237, 243, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: max(2vh, 10px) 15px;
        }

        .game-container {
            display: flex; flex-direction: column; align-items: center;
            gap: clamp(8px, 2vh, 16px); width: 100%; max-width: 680px;
            animation: fadeIn 0.5s ease-out;
        }

        .game-header { text-align: center; width: 100%; }
        .game-title { font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight: 700; margin-bottom: 2px; }
        .game-subtitle { font-size: clamp(0.6rem, 2vw, 0.75rem); color: var(--text-secondary); font-weight: 500; text-transform: uppercase; margin-bottom: clamp(8px, 1.5vh, 12px); }

        .controls-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .btn-modern {
            background: var(--bg-card); border: 1px solid var(--border-muted); color: var(--text-secondary);
            padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit;
            font-size: clamp(0.7rem, 2.5vw, 0.8rem); font-weight: 500; transition: all 0.2s ease;
        }
        .btn-modern:hover { color: var(--text-primary); background: #2a3038; border-color: #8b949e; }
        .btn-modern.active { background: var(--bg-primary); border-color: var(--accent-blue); color: var(--accent-blue); }

        .scoreboard { display: flex; align-items: center; justify-content: center; gap: clamp(8px, 2vw, 16px); width: 100%; max-width: 500px; }
        .player-card { flex: 1; background: var(--bg-card); border: 1px solid var(--border-muted); border-radius: 6px; padding: clamp(6px, 1.5vw, 10px); text-align: center; transition: all 0.3s ease; opacity: 0.5; }
        .player-card.active { opacity: 1; border-color: var(--text-secondary); background: var(--bg-secondary); }
        .player-card.red.active { border-bottom: 3px solid var(--accent-red); }
        .player-card.black.active { border-bottom: 3px solid var(--accent-blue); }
        .player-name { font-size: clamp(0.55rem, 2vw, 0.7rem); font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; white-space: nowrap; }
        .player-card.active .player-name { color: var(--text-primary); }
        .pieces-count { font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: 700; color: var(--text-primary); transition: transform 0.2s; }
        .pieces-count.bump { transform: scale(1.2); }
        .vs-badge { font-weight: 600; color: var(--border-muted); font-size: clamp(0.7rem, 2vw, 0.85rem); }

        .board {
            width: 100%; max-width: min(100%, 65vh); aspect-ratio: 1 / 1;
            background: var(--bg-secondary); border-radius: 6px; overflow: hidden;
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            border: 1px solid var(--border-muted); box-shadow: 0 10px 30px rgba(0,0,0,0.4); margin: 0 auto;
        }

        .cell { display: flex; align-items: center; justify-content: center; position: relative; }
        .cell.light { background-color: var(--board-light); }
        .cell.dark { background-color: var(--board-dark); }

        .piece {
            width: 75%; height: 75%; border-radius: 50%; cursor: pointer; position: relative; z-index: 2;
            transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; align-items: center; justify-content: center;
            animation: spawnPiece 0.3s both; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .piece.red { background: linear-gradient(135deg, var(--piece-red), var(--piece-red-dark)); }
        .piece.black { background: linear-gradient(135deg, var(--piece-black), var(--piece-black-dark)); }
        .piece.selected { transform: scale(1.05); box-shadow: 0 0 0 clamp(2px, 1vw, 4px) var(--board-dark), 0 0 0 clamp(4px, 1.5vw, 6px) var(--selection-ring); }
        .piece.fade-out { animation: disintegrate 0.3s ease-in forwards; }
        .piece.king::after { content: '♔'; color: white; font-size: clamp(14px, 3.5vw, 24px); opacity: 0.9; animation: crownPop 0.4s ease both; }

        .cell.valid { cursor: pointer; }
        .cell.valid::after { content: ''; width: 25%; height: 25%; background: var(--valid-move); border-radius: 50%; position: absolute; z-index: 3; pointer-events: none; transition: background 0.2s; }

        .victory-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(5px); z-index: 100;
            display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px;
        }
        .victory-screen.show { opacity: 1; pointer-events: auto; }
        .victory-card { background: var(--bg-card); border: 1px solid var(--border-muted); padding: clamp(20px, 5vw, 30px); border-radius: 12px; text-align: center; max-width: 350px; width: 100%; transform: scale(0.95); transition: transform 0.3s ease; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .victory-screen.show .victory-card { transform: scale(1); }
        .victory-banner { font-size: clamp(1.5rem, 5vw, 2rem); margin-bottom: 12px; }
        .victory-title { font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
        .victory-text { color: var(--text-secondary); font-size: clamp(0.75rem, 2.5vw, 0.85rem); margin-bottom: 24px; }
        .btn-primary { background: var(--accent-blue); color: #fff; border: none; padding: 10px 20px; border-radius: 4px; font-size: clamp(0.75rem, 2.5vw, 0.85rem); font-weight: 600; cursor: pointer; transition: background 0.2s ease; width: 100%; }
        .btn-primary:active { background: var(--accent-blue-hover); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spawnPiece { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes crownPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 0.9; } }
        @keyframes disintegrate { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="game-container">
        <header class="game-header">
            <h1 class="game-title">Cyber Damas</h1>
            <p class="game-subtitle">IA com Cérebro Global</p>
            <div class="controls-row">
                <button class="btn-modern active" id="vsPlayerBtn">Modo PvP</button>
                <button class="btn-modern" id="vsAiBtn">Contra IA</button>
            </div>
        </header>

        <div class="scoreboard">
            <div class="player-card red active" id="card-red">
                <div class="player-name">Você (Vermelho)</div>
                <div class="pieces-count" id="count-red">12</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="player-card black" id="card-black">
                <div class="player-name" id="name-black">Jogador (Azul)</div>
                <div class="pieces-count" id="count-black">12</div>
            </div>
        </div>

        <div class="board" id="board"></div>
    </div>

    <div class="victory-screen" id="victoryScreen">
        <div class="victory-card" id="victoryCard">
            <div class="victory-banner">🏆</div>
            <h2 class="victory-title" id="winnerTitle">Vitória!</h2>
            <p class="victory-text" id="winnerSubText">Partida encerrada com sucesso.</p>
            <button class="btn-primary" id="restartBtn">Jogar Novamente</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, increment, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6hQbsB-S8fJXwGXI2AZHGx2Ze1LM2bzY",
            authDomain: "gen-lang-client-0148180315.firebaseapp.com",
            projectId: "gen-lang-client-0148180315",
            storageBucket: "gen-lang-client-0148180315.firebasestorage.app",
            messagingSenderId: "128524317639",
            appId: "1:128524317639:web:fc4284e3f6609f91a15fe2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const boardElement = document.getElementById('board');
        const countRedElement = document.getElementById('count-red');
        const countBlackElement = document.getElementById('count-black');
        const cardRed = document.getElementById('card-red');
        const cardBlack = document.getElementById('card-black');
        const nameBlack = document.getElementById('name-black');
        const vsPlayerBtn = document.getElementById('vsPlayerBtn');
        const vsAiBtn = document.getElementById('vsAiBtn');

        const victoryScreen = document.getElementById('victoryScreen');
        const winnerTitle = document.getElementById('winnerTitle');
        const winnerSubText = document.getElementById('winnerSubText');
        const restartBtn = document.getElementById('restartBtn');

        let boardState = [];
        let turn = 'red'; 
        let selectedPiece = null;
        let validMoves = [];
        let isVsAI = false; 
        let isMultiJumpMode = false;
        let gameActive = true; 
        let currentMatchHistory = []; 

        vsPlayerBtn.addEventListener('click', () => { setGameMode(false); });
        vsAiBtn.addEventListener('click', () => { setGameMode(true); });
        restartBtn.addEventListener('click', () => { 
            victoryScreen.classList.remove('show');
            initGame(); 
        });

        function setGameMode(aiMode) {
            isVsAI = aiMode;
            vsPlayerBtn.classList.toggle('active', !aiMode);
            vsAiBtn.classList.toggle('active', aiMode);
            nameBlack.textContent = aiMode ? "IA (Azul)" : "Jogador (Azul)";
            initGame();
        }

        function initGame() {
            boardState = Array(8).fill(null).map(() => Array(8).fill(null));
            turn = 'red';
            selectedPiece = null;
            validMoves = [];
            isMultiJumpMode = false;
            gameActive = true;
            currentMatchHistory = []; 

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        if (row < 3) boardState[row][col] = { type: 'black', king: false };
                        else if (row > 4) boardState[row][col] = { type: 'red', king: false };
                    }
                }
            }
            renderBoard(true);
            updateScoreboard(false);
        }

        function renderBoard(isInitial = false) {
            boardElement.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell', (row + col) % 2 === 1 ? 'dark' : 'light');
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    const pieceData = boardState[row][col];
                    if (pieceData) {
                        const piece = document.createElement('div');
                        piece.classList.add('piece', pieceData.type);
                        if (pieceData.king) piece.classList.add('king');
                        
                        if(!isInitial) piece.style.animation = 'none';

                        if (selectedPiece && selectedPiece.row === row && selectedPiece.col === col) {
                            piece.classList.add('selected');
                            piece.style.animation = '';
                        }
                        
                        piece.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (!gameActive || (isVsAI && turn === 'black')) return; 
                            handlePieceClick(row, col);
                        });
                        cell.appendChild(piece);
                    }

                    const isMoveValid = validMoves.some(m => m.toRow === row && m.toCol === col);
                    if (isMoveValid && gameActive) {
                        cell.classList.add('valid');
                        cell.addEventListener('click', () => {
                            if (isVsAI && turn === 'black') return;
                            handleMove(row, col);
                        });
                    }
                    boardElement.appendChild(cell);
                }
            }
        }

        function handlePieceClick(row, col) {
            if (isMultiJumpMode && (selectedPiece.row !== row || selectedPiece.col !== col)) return;
            const piece = boardState[row][col];
            if (!piece || piece.type !== turn) return;

            selectedPiece = { row, col };
            calculateValidMoves(row, col);
            renderBoard();
        }

        function calculateValidMoves(row, col, restrictToJumps = false) {
            validMoves = [];
            const piece = boardState[row][col];
            if (!piece) return;

            const directions = [{ r: -1, c: -1 }, { r: -1, c: 1 }, { r: 1, c: -1 }, { r: 1, c: 1 }];

            if (piece.king) {
                directions.forEach(dir => {
                    let nextR = row + dir.r;
                    let nextC = col + dir.c;
                    let encounteredEnemy = null;

                    while (nextR >= 0 && nextR < 8 && nextC >= 0 && nextC < 8) {
                        const currentTile = boardState[nextR][nextC];
                        if (!encounteredEnemy) {
                            if (!currentTile) {
                                if (!restrictToJumps && !isMultiJumpMode) validMoves.push({ toRow: nextR, toCol: nextC, jump: null });
                            } else if (currentTile.type !== piece.type) {
                                encounteredEnemy = { r: nextR, c: nextC };
                            } else break;
                        } else {
                            if (!currentTile) validMoves.push({ toRow: nextR, toCol: nextC, jump: { r: encounteredEnemy.r, c: encounteredEnemy.c } });
                            else break;
                        }
                        nextR += dir.r;
                        nextC += dir.c;
                    }
                });
            } else {
                const allowedDirections = [];
                if (piece.type === 'red') allowedDirections.push({ r: -1, c: -1 }, { r: -1, c: 1 });
                if (piece.type === 'black') allowedDirections.push({ r: 1, c: -1 }, { r: 1, c: 1 });

                allowedDirections.forEach(dir => {
                    let nextR = row + dir.r;
                    let nextC = col + dir.c;
                    if (nextR >= 0 && nextR < 8 && nextC >= 0 && nextC < 8) {
                        if (!boardState[nextR][nextC] && !restrictToJumps && !isMultiJumpMode) {
                            validMoves.push({ toRow: nextR, toCol: nextC, jump: null });
                        } else if (boardState[nextR][nextC] && boardState[nextR][nextC].type !== piece.type) {
                            let jumpR = nextR + dir.r;
                            let jumpC = nextC + dir.c;
                            if (jumpR >= 0 && jumpR < 8 && jumpC >= 0 && jumpC < 8) {
                                if (!boardState[jumpR][jumpC]) validMoves.push({ toRow: jumpR, toCol: jumpC, jump: { r: nextR, c: nextC } });
                            }
                        }
                    }
                });
            }
        }

        function handleMove(toRow, toCol) {
            const move = validMoves.find(m => m.toRow === toRow && m.toCol === toCol);
            if (!move || !selectedPiece) return;

            const piece = boardState[selectedPiece.row][selectedPiece.col];
            
            if (move.jump) {
                const targetCell = boardElement.querySelector(`[data-row="${move.jump.r}"][data-col="${move.jump.c}"]`);
                const targetPiece = targetCell ? targetCell.querySelector('.piece') : null;
                
                if (targetPiece) {
                    targetPiece.classList.add('fade-out');
                    setTimeout(() => { executeMove(toRow, toCol, move, piece); }, 250);
                    return;
                }
            }
            executeMove(toRow, toCol, move, piece);
        }

        function executeMove(toRow, toCol, move, piece) {
            boardState[toRow][toCol] = piece;
            boardState[selectedPiece.row][selectedPiece.col] = null;

            if (move.jump) {
                boardState[move.jump.r][move.jump.c] = null;
                selectedPiece = { row: toRow, col: toCol };
                calculateValidMoves(toRow, toCol, true); 

                if (validMoves.length > 0) {
                    isMultiJumpMode = true;
                    renderBoard();
                    updateScoreboard(true);
                    if (isVsAI && turn === 'black') setTimeout(() => { makeAiSubsequentMove(); }, 600);
                    return; 
                }
            }

            if ((piece.type === 'red' && toRow === 0) || (piece.type === 'black' && toRow === 7)) piece.king = true;

            isMultiJumpMode = false;
            selectedPiece = null;
            validMoves = [];
            turn = turn === 'red' ? 'black' : 'red';
            
            renderBoard();
            updateScoreboard(true);
            checkGameOver(); 

            if (gameActive && isVsAI && turn === 'black') playAiTurn(); 
        }

        function getBoardStateHash() {
            let hash = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if ((r + c) % 2 === 1) { 
                        const p = boardState[r][c];
                        if (!p) hash += 'x'; 
                        else if (p.type === 'red') hash += p.king ? 'R' : 'r';
                        else hash += p.king ? 'B' : 'b';
                    }
                }
            }
            return hash;
        }

        async function playAiTurn() {
            if (turn !== 'black' || !gameActive) return;

            nameBlack.textContent = "IA Pensando...";

            let jumpMoves = [];
            let normalMoves = [];

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c]?.type === 'black') {
                        calculateValidMoves(r, c, isMultiJumpMode);
                        validMoves.forEach(m => {
                            const fullMove = { fromRow: r, fromCol: c, toRow: m.toRow, toCol: m.toCol, jump: m.jump };
                            if (m.jump) jumpMoves.push(fullMove);
                            else normalMoves.push(fullMove);
                        });
                    }
                }
            }

            let allMoves = jumpMoves.length > 0 ? jumpMoves : normalMoves;
            
            if (allMoves.length === 0) {
                // Se a IA não tem peças ou não pode se mover (bloqueada), ela perde.
                endGame('red');
                return;
            }

            const currentState = getBoardStateHash();
            let globalWeights = {};

            try {
                const stateRef = doc(db, "cerebro_ia", currentState);
                const stateSnap = await getDoc(stateRef);
                if (stateSnap.exists()) {
                    globalWeights = stateSnap.data();
                }
            } catch (e) {
                console.warn("Sem conexão com o cérebro global, jogando offline.", e);
            }

            let selectedMove = null;
            let bestScore = -Infinity;
            const explorationRate = 0.2; 

            if (Math.random() < explorationRate) {
                selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)];
            } else {
                allMoves.forEach(m => {
                    const moveKey = `M${m.fromRow}${m.fromCol}${m.toRow}${m.toCol}`;
                    let score = globalWeights[moveKey] || 0; 
                    score += (Math.random() * 0.1); 

                    if (score > bestScore) {
                        bestScore = score;
                        selectedMove = m;
                    }
                });
            }

            if (selectedMove) {
                const chosenMoveKey = `M${selectedMove.fromRow}${selectedMove.fromCol}${selectedMove.toRow}${selectedMove.toCol}`;
                currentMatchHistory.push({ state: currentState, move: chosenMoveKey });

                selectedPiece = { row: selectedMove.fromRow, col: selectedMove.fromCol };
                validMoves = [{ toRow: selectedMove.toRow, toCol: selectedMove.toCol, jump: selectedMove.jump }];
                
                nameBlack.textContent = "IA (Azul)"; 
                renderBoard(); 
                
                setTimeout(() => { handleMove(selectedMove.toRow, selectedMove.toCol); }, 300);
            }
        }

        // A IA agora salva saltos múltiplos em seu histórico de aprendizado
        function makeAiSubsequentMove() {
            if(validMoves.length > 0) {
                let move = validMoves[0];
                
                // Registra o estado antes do salto subsequente para aprendizado
                const currentState = getBoardStateHash();
                const chosenMoveKey = `M${selectedPiece.row}${selectedPiece.col}${move.toRow}${move.toCol}`;
                currentMatchHistory.push({ state: currentState, move: chosenMoveKey });

                validMoves = [move];
                handleMove(move.toRow, move.toCol);
            }
        }

        function checkGameOver() {
            let redCount = 0, blackCount = 0;
            let redCanMove = false, blackCanMove = false;

            // Conta peças e verifica se algum lado não tem peças
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if (boardState[row][col]?.type === 'red') redCount++;
                    if (boardState[row][col]?.type === 'black') blackCount++;
                }
            }
            
            if (redCount === 0) {
                endGame('black');
                return;
            } else if (blackCount === 0) {
                endGame('red');
                return;
            }
        }

        // Otimizado para usar WriteBatch (Muito mais rápido e seguro)
        async function trainGlobalBrain(winner) {
            console.log("Treinando a IA Global no Firebase...");
            const reward = (winner === 'black') ? 10 : -10;
            
            try {
                const batch = writeBatch(db);
                
                for (const step of currentMatchHistory) {
                    const stateRef = doc(db, "cerebro_ia", step.state);
                    batch.set(stateRef, {
                        [step.move]: increment(reward)
                    }, { merge: true });
                }
                
                await batch.commit();
                console.log("Treinamento em Lote concluído com sucesso!");
            } catch (e) {
                console.error("Falha ao atualizar o Cérebro Global:", e);
            }
        }

        async function endGame(winner) {
            if (!gameActive) return; // Evita chamada dupla
            gameActive = false;
            validMoves = [];
            selectedPiece = null;
            renderBoard();

            try {
                await addDoc(collection(db, "historico_partidas"), {
                    ganhador: winner, 
                    modo: isVsAI ? "Contra IA" : "PvP",
                    timestamp: new Date().toISOString()
                });
                console.log("Histórico de partida salvo com sucesso.");
            } catch(e) {
                console.warn("Erro ao salvar histórico (verifique as regras do Firebase)", e);
            }

            if (isVsAI) {
                trainGlobalBrain(winner);
            }
            
            if (winner === 'red') {
                winnerTitle.textContent = "Vitória do Vermelho!";
                winnerSubText.textContent = isVsAI ? "Você superou a mente coletiva da IA!" : "O jogador vermelho dominou o tabuleiro.";
            } else {
                winnerTitle.textContent = "Vitória do Azul!";
                winnerSubText.textContent = isVsAI ? "A Inteligência Artificial venceu." : "O jogador azul dominou o tabuleiro.";
            }

            setTimeout(() => { victoryScreen.classList.add('show'); }, 400);
        }

        function updateScoreboard(bumpAnimation = false) {
            let redCount = 0, blackCount = 0;
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if (boardState[row][col]?.type === 'red') redCount++;
                    if (boardState[row][col]?.type === 'black') blackCount++;
                }
            }
            if (bumpAnimation) {
                if(countRedElement.textContent != redCount) triggerBump(countRedElement);
                if(countBlackElement.textContent != blackCount) triggerBump(countBlackElement);
            }
            countRedElement.textContent = redCount;
            countBlackElement.textContent = blackCount;

            if (turn === 'red') {
                cardRed.classList.add('active');
                cardBlack.classList.remove('active');
            } else {
                cardBlack.classList.add('active');
                cardRed.classList.remove('active');
            }
        }

        function triggerBump(element) {
            element.classList.add('bump');
            setTimeout(() => element.classList.remove('bump'), 200);
        }

        initGame();
    </script>
</body>
</html>
